version: "3.8"

services:
   frontend-compliance:
      build: ./frontend/frontend-compliance
      container_name: frontend-compliance
      ports:
         - "5173:5173"
      volumes:
         - ./frontend/frontend-compliance:/app
         - ./frontend/common-components:/app/common-components
         - /app/node_modules
      networks:
         - app_network
      depends_on:
         - backend

   frontend-crm:
      build: ./frontend/frontend-crm
      container_name: frontend-crm
      ports:
         - "5174:5174"
      volumes:
         - ./frontend/frontend-crm:/app
         - ./frontend/common-components:/app/common-components
         - /app/node_modules
      networks:
         - app_network
      depends_on:
         - backend

   backend:
      build: .
      container_name: fastapi_backend
      ports:
         - "8000:8000"
      volumes:
         - ./data:/app/data
         - .:/app
      environment:
         - MONGODB_URL=mongodb://mongodb:27017
         - MONGODB_DB=ocr_database
      depends_on:
         - mongodb
      networks:
         - app_network

   mongodb:
      image: mongo:7.0
      container_name: mongodb
      ports:
         - "27017:27017"
      volumes:
         - mongodb_data:/data/db
      networks:
         - app_network

volumes:
   mongodb_data:

networks:
   app_network:
      driver: bridge
